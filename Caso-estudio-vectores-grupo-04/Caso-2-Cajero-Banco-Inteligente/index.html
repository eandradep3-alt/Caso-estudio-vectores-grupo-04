<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cajero Bancario Inteligente</title>
    <style>
        table td {
            text-align: center;
        }
    </style>
</head>
<body>
    <table border="1">
        <thead>
            <tr>
                <th colspan="5">Cajero Bancario Inteligente</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="2">
                    <input type="number" id="num-ingreso-monto" placeholder="Ingresar monto">
                </td>
                <td >Operaciones</td>
                <td colspan="3">
                    <select id="id-select-operaciones">
                        <option value="Deposito">Deposito</option>
                        <option value="Retiro">Retiro</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="5">
                    <button id="btn-continuar">Continuar</button>
                </td>
            </tr>
            <tr>
                <td colspan="5">
                    <button id="btn-limpiar">Limpiar</button>
                </td>
            </tr>
            <tr>
                <td colspan="2"> Total Deposito:</td>
                    <td colspan="3">
                        <input type="text" id="num-total-depositado" readonly>
                    </td>
            </tr>
            <tr>
                <td colspan="2"> Total retirado:</td>
                <td colspan="3">
                    <input type="text" id="num-id-total-retiro" readonly>
                </td>
            </tr>
            <tr colspan="2">
                <td> Saldo Final:</td>
                <td  colspan="3">
                    <input type="text" id="num-id-saldo-final" readonly>
                </td>
            </tr>
            </tbody>
    </table>
    <script src="JS-Caso-2/app.js"></script>
</body>
</html>
